<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30-Day Goal &amp; Habit Tracker — My Nest Chapter</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:'Arial',sans-serif;font-size:12pt;color:#FFF8EE;background-color:#252535;margin:0;padding:40px 16px;display:flex;justify-content:center;min-height:100vh}
    .widget-container{width:100%;max-width:600px;background:#FFF8EE;border:1px solid #ABABAB;padding:36px 36px 48px;color:#252535}
    .skip-link{position:absolute;top:-40px;left:0;background:#E87AAA;color:#252535;padding:8px 16px;z-index:9999;font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;text-decoration:none}
    .skip-link:focus{top:0}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    @keyframes contentFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .content-enter{animation:contentFadeIn 0.22s ease both}

    /* Brand tag */
    .brand-tag{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;letter-spacing:3px;color:#C45C88;margin-bottom:18px}

    /* Widget header */
    .widget-header{margin-bottom:6px}
    .widget-header h1{font-family:'Montserrat',sans-serif;font-weight:800;font-size:18pt;color:#252535;margin:0 0 4px;text-transform:uppercase;letter-spacing:0.5px}
    .widget-header .tagline{font-family:'Arial',sans-serif;font-size:11pt;color:#5A5A72;margin:0 0 6px;line-height:1.5}
    .day-strip{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #D3D3D3}
    .day-badge{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11pt;color:#E87AAA;text-transform:uppercase;letter-spacing:1px}
    .day-date{font-family:'Arial',sans-serif;font-size:10pt;color:#5A5A72}

    /* Tab nav */
    .tab-nav{display:flex;border-bottom:2px solid #252535;margin-bottom:28px;gap:0;overflow-x:auto}
    .tab-btn{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;letter-spacing:1px;color:#5A5A72;background:transparent;border:none;padding:10px 14px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;touch-action:manipulation;flex-shrink:0}
    .tab-btn:hover{color:#252535}
    .tab-btn.active{color:#252535;border-bottom-color:#E87AAA}
    .tab-btn:active{transform:translateY(1px)}
    @media(hover:none) and (pointer:coarse){.tab-btn{min-height:44px}}

    /* Section titles */
    .section-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13pt;color:#252535;border-bottom:1px solid #5A5A72;padding-bottom:6px;margin:0 0 20px;text-transform:uppercase;letter-spacing:0.5px}
    .section-sub{font-family:'Arial',sans-serif;font-size:11pt;color:#5A5A72;line-height:1.5;margin:0 0 24px}

    /* Setup wizard */
    .setup-progress{display:flex;gap:8px;margin-bottom:28px;align-items:center}
    .setup-step-dot{width:28px;height:28px;border:2px solid #ABABAB;background:#FFF8EE;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;color:#ABABAB;flex-shrink:0;cursor:pointer}
    .setup-step-dot.active{border-color:#252535;color:#252535}
    .setup-step-dot.done{border-color:#E87AAA;background:#E87AAA;color:#252535}
    .setup-step-label{font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt;color:#5A5A72;text-transform:uppercase;letter-spacing:1px;margin-left:4px}
    .setup-step-connector{flex:1;height:1px;background:#D3D3D3}

    /* Life assessment */
    .life-area-row{margin-bottom:18px}
    .life-area-name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10pt;color:#252535;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
    .life-area-desc{font-family:'Arial',sans-serif;font-size:10pt;color:#5A5A72;margin-bottom:8px;line-height:1.4}
    .rating-row{display:flex;gap:4px;flex-wrap:wrap}
    .rating-btn{width:36px;height:36px;border:1px solid #ABABAB;background:#FFF8EE;font-family:'Montserrat',sans-serif;font-weight:800;font-size:10pt;color:#5A5A72;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
    .rating-btn:hover{border-color:#252535;color:#252535}
    .rating-btn.selected{background:#E87AAA;border-color:#E87AAA;color:#252535}
    .rating-btn:active{transform:translateY(1px)}
    @media(hover:none) and (pointer:coarse){.rating-btn{min-width:44px;min-height:44px}}

    /* Values picker */
    .values-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
    .value-chip{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;letter-spacing:0.5px;padding:8px 14px;border:1px solid #ABABAB;color:#5A5A72;background:#FFF8EE;cursor:pointer;touch-action:manipulation}
    .value-chip:hover{border-color:#252535;color:#252535}
    .value-chip.selected{background:#E87AAA;border-color:#E87AAA;color:#252535}
    .value-chip:active{transform:translateY(1px)}
    .values-ranked{margin-top:16px}
    .ranked-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #D3D3D3}
    .ranked-num{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10pt;color:#ABABAB;width:20px;flex-shrink:0}
    .ranked-label{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10pt;color:#252535;text-transform:uppercase;flex:1}
    .rank-arrows{display:flex;gap:4px}
    .rank-arrow{background:none;border:1px solid #ABABAB;color:#5A5A72;font-size:10pt;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
    .rank-arrow:hover{border-color:#252535;color:#252535}

    /* Goal cards */
    .goal-block{border:1px solid #ABABAB;margin-bottom:20px}
    .goal-block-header{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11pt;color:#252535;text-transform:uppercase;padding:14px 16px;background:#FFF8EE;cursor:pointer;display:flex;justify-content:space-between;align-items:center;touch-action:manipulation}
    .goal-block-header:hover{background:#F5C4A8}
    .goal-block-body{padding:16px;border-top:1px solid #D3D3D3;display:none}
    .goal-block-body.open{display:block}
    .goal-block-chevron{font-size:9pt;color:#ABABAB}

    /* Form elements */
    label{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;letter-spacing:0.5px;color:#252535;display:block;margin-bottom:5px}
    .field-hint{font-family:'Arial',sans-serif;font-size:10pt;color:#5A5A72;margin-bottom:7px;line-height:1.4}
    input[type=text],input[type=number],textarea,select{font-family:'Arial',sans-serif;font-size:12pt;color:#252535;padding:12px 14px;border:1px solid #ABABAB;background:#FFF8EE;outline:none;width:100%;margin-bottom:16px;touch-action:manipulation}
    input[type=text]:focus,textarea:focus,select:focus{border-color:#E87AAA;background:#FFFFFF}
    textarea{resize:vertical;min-height:70px}
    input::placeholder,textarea::placeholder{color:#BCBCBC}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:480px){.two-col{grid-template-columns:1fr}}

    /* Habit stacking */
    .habit-sentence-preview{font-family:'Arial',sans-serif;font-size:11pt;color:#5A5A72;font-style:italic;padding:12px 14px;border:1px dashed #D3D3D3;margin-bottom:16px;line-height:1.5}
    .habit-sentence-preview strong{color:#252535;font-style:normal}

    /* Buttons */
    .btn-primary{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13pt;color:#252535;background:#E87AAA;border:none;padding:14px 32px;cursor:pointer;text-transform:uppercase;touch-action:manipulation;display:inline-block}
    .btn-primary:hover{background:#CF638E}
    .btn-primary:active{transform:translateY(1px)}
    .btn-outline{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11pt;color:#E87AAA;background:transparent;border:1px solid #E87AAA;padding:12px 24px;cursor:pointer;text-transform:uppercase;touch-action:manipulation}
    .btn-outline:hover{background:#FFF0F6}
    .btn-outline:active{transform:translateY(1px)}
    .btn-ghost{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;color:#5A5A72;background:transparent;border:none;padding:8px 0;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;touch-action:manipulation}
    .btn-ghost:hover{color:#252535}
    .btn-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:12px}
    @media(hover:none) and (pointer:coarse){.btn-primary,.btn-outline{min-height:44px}}

    /* Daily tracker */
    .energy-row{margin-bottom:24px}
    .energy-label{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;letter-spacing:0.5px;color:#252535;margin-bottom:8px}
    .energy-btns{display:flex;gap:4px;flex-wrap:wrap}
    .energy-btn{width:40px;height:40px;border:1px solid #ABABAB;background:#FFF8EE;font-family:'Montserrat',sans-serif;font-weight:800;font-size:10pt;color:#5A5A72;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
    .energy-btn.selected{background:#A8C5DA;border-color:#A8C5DA;color:#252535}
    .energy-btn:active{transform:translateY(1px)}
    @media(hover:none) and (pointer:coarse){.energy-btn{min-width:44px;min-height:44px}}

    .goal-track-block{border:1px solid #D3D3D3;margin-bottom:16px}
    .goal-track-header{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10pt;color:#252535;text-transform:uppercase;letter-spacing:0.5px;padding:12px 14px;border-bottom:1px solid #D3D3D3;background:#F5F5F0}
    .goal-track-body{padding:14px 16px}
    .progress-options{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .progress-opt{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;letter-spacing:0.5px;padding:8px 14px;border:1px solid #ABABAB;color:#5A5A72;background:#FFF8EE;cursor:pointer;touch-action:manipulation}
    .progress-opt:hover{border-color:#252535;color:#252535}
    .progress-opt.selected-started{background:#A8C5DA;border-color:#A8C5DA;color:#252535}
    .progress-opt.selected-progress{background:#C4B0E8;border-color:#C4B0E8;color:#252535}
    .progress-opt.selected-done{background:#E87AAA;border-color:#E87AAA;color:#252535}
    .progress-opt:active{transform:translateY(1px)}
    @media(hover:none) and (pointer:coarse){.progress-opt{min-height:44px}}

    .habit-track-block{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #D3D3D3;gap:12px;flex-wrap:wrap}
    .habit-track-name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10pt;color:#252535;text-transform:uppercase;flex:1;min-width:120px}
    .habit-opts{display:flex;gap:6px;flex-wrap:wrap}
    .habit-opt{font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt;text-transform:uppercase;letter-spacing:0.5px;padding:7px 10px;border:1px solid #ABABAB;color:#5A5A72;background:#FFF8EE;cursor:pointer;touch-action:manipulation;white-space:nowrap}
    .habit-opt.sel-full{background:#E87AAA;border-color:#E87AAA;color:#252535}
    .habit-opt.sel-min{background:#C4B0E8;border-color:#C4B0E8;color:#252535}
    .habit-opt.sel-skip{background:#D3D3D3;border-color:#D3D3D3;color:#5A5A72}
    .habit-opt:active{transform:translateY(1px)}
    @media(hover:none) and (pointer:coarse){.habit-opt{min-height:44px}}

    /* Weekly grid */
    .week-selector{display:flex;gap:8px;margin-bottom:24px}
    .week-btn{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;padding:8px 14px;border:1px solid #ABABAB;background:#FFF8EE;color:#5A5A72;cursor:pointer;touch-action:manipulation}
    .week-btn.active{background:#252535;border-color:#252535;color:#FFF8EE}
    .week-btn:active{transform:translateY(1px)}

    .tracker-grid{width:100%;border-collapse:collapse;margin-bottom:24px;font-size:10pt}
    .tracker-grid th{font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt;text-transform:uppercase;letter-spacing:0.5px;color:#5A5A72;padding:8px 6px;border-bottom:2px solid #252535;text-align:center}
    .tracker-grid th.row-label{text-align:left}
    .tracker-grid td{padding:8px 6px;border-bottom:1px solid #D3D3D3;text-align:center}
    .tracker-grid td.row-label{text-align:left;font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;color:#252535;text-transform:uppercase}
    .cell-s{background:#A8C5DA;color:#252535;font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt}
    .cell-p{background:#C4B0E8;color:#252535;font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt}
    .cell-d{background:#E87AAA;color:#252535;font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt}
    .cell-fv{background:#E87AAA;color:#252535;font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt}
    .cell-mv{background:#C4B0E8;color:#252535;font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt}
    .cell-sk{background:#D3D3D3;color:#5A5A72;font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt}
    .cell-empty{color:#BCBCBC;font-size:8pt}

    /* Monthly habit grid */
    .habit-grid-section{margin-bottom:32px}
    .habit-grid-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10pt;color:#252535;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
    .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
    .month-grid-header{font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt;text-transform:uppercase;color:#5A5A72;text-align:center;padding:4px 2px}
    .month-grid-cell{height:32px;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt;border:1px solid #D3D3D3}
    .mgc-fv{background:#E87AAA;border-color:#E87AAA;color:#252535}
    .mgc-mv{background:#C4B0E8;border-color:#C4B0E8;color:#252535}
    .mgc-sk{background:#D3D3D3;border-color:#D3D3D3;color:#5A5A72}
    .mgc-empty{background:#FFF8EE;color:#BCBCBC}
    .mgc-future{background:#F5F5F0;color:#D3D3D3;border-color:#D3D3D3}
    .habit-grid-legend{display:flex;gap:14px;flex-wrap:wrap;font-family:'Arial',sans-serif;font-size:9pt;color:#5A5A72;margin-bottom:6px}
    .legend-dot{width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:4px}

    /* Stats bar */
    .stats-bar{display:flex;gap:0;border:1px solid #D3D3D3;margin-bottom:28px}
    .stat-item{flex:1;padding:14px 12px;text-align:center;border-right:1px solid #D3D3D3}
    .stat-item:last-child{border-right:none}
    .stat-num{font-family:'Montserrat',sans-serif;font-weight:800;font-size:16pt;color:#E87AAA;display:block}
    .stat-label{font-family:'Arial',sans-serif;font-size:9pt;color:#5A5A72;text-transform:uppercase}

    /* Review blocks */
    .review-block{margin-bottom:24px;padding:20px;border:1px solid #D3D3D3}
    .review-block-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10pt;color:#252535;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px}
    .hit-options{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
    .hit-opt{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;padding:8px 14px;border:1px solid #ABABAB;color:#5A5A72;background:#FFF8EE;cursor:pointer;touch-action:manipulation}
    .hit-opt.sel-yes{background:#E87AAA;border-color:#E87AAA;color:#252535}
    .hit-opt.sel-prog{background:#C4B0E8;border-color:#C4B0E8;color:#252535}
    .hit-opt.sel-no{background:#D3D3D3;border-color:#D3D3D3;color:#5A5A72}
    .hit-opt:active{transform:translateY(1px)}
    .days-badge{font-family:'Montserrat',sans-serif;font-weight:800;font-size:14pt;color:#E87AAA;margin:8px 0 4px}
    .habit-rating{display:flex;gap:6px;margin-top:6px}
    .hrating-opt{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;padding:7px 12px;border:1px solid #ABABAB;color:#5A5A72;background:#FFF8EE;cursor:pointer;touch-action:manipulation}
    .hrating-opt.sel-good{background:#E87AAA;border-color:#E87AAA;color:#252535}
    .hrating-opt.sel-okay{background:#C4B0E8;border-color:#C4B0E8;color:#252535}
    .hrating-opt.sel-work{background:#D3D3D3;border-color:#D3D3D3;color:#5A5A72}
    .hrating-opt:active{transform:translateY(1px)}

    /* Empty state */
    .empty-state{border:1px dashed #D3D3D3;padding:32px 24px;text-align:center;margin:8px 0}
    .empty-brand{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;letter-spacing:3px;text-transform:uppercase;color:#D3D3D3;margin-bottom:12px}
    .empty-msg{font-family:'Montserrat',sans-serif;font-weight:400;font-size:10pt;color:#5A5A72}

    /* Progress bar */
    .progress-bar-wrap{margin-bottom:24px}
    .progress-bar-label{display:flex;justify-content:space-between;margin-bottom:5px}
    .progress-bar-label span{font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;text-transform:uppercase;color:#5A5A72}
    .progress-bar-track{height:6px;background:#D3D3D3;width:100%}
    .progress-bar-fill{height:6px;background:#E87AAA;transition:width 0.4s ease}

    /* Toast */
    #toast{position:fixed;top:0;left:50%;transform:translateX(-50%);background:#E87AAA;color:#252535;font-family:'Montserrat',sans-serif;font-weight:800;font-size:9pt;letter-spacing:2px;text-transform:uppercase;padding:14px 28px;border-bottom:2px solid #C45C88;z-index:9999;display:none;white-space:nowrap}

    /* Confirm modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(37,37,53,0.7);z-index:8888;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-backdrop.open{display:flex}
    .modal-box{background:#FFF8EE;border:1px solid #252535;max-width:420px;width:100%;padding:32px}
    .modal-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13pt;color:#252535;text-transform:uppercase;margin-bottom:12px}
    .modal-msg{font-family:'Arial',sans-serif;font-size:12pt;color:#252535;line-height:1.5;margin-bottom:24px}
    .modal-btns{display:flex;gap:12px;justify-content:flex-end}

    button,input,textarea,select,a{touch-action:manipulation}
    @media(max-width:520px){.widget-container{padding:24px 20px 36px}.tab-btn{font-size:8pt;padding:10px 10px}}
  </style>
</head>
<body>
  <a href="#content" class="skip-link">Skip to main content</a>

  <div class="widget-container">
    <div id="demoBanner" style="display:none;background:#252535;margin:-36px -36px 28px -36px;padding:14px 24px;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;" role="banner">
      <p style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt;text-transform:uppercase;letter-spacing:2px;color:#A8C5DA;margin:0;">DEMO — This is a sample preview</p>
      <a href="/shop/goal-habit-tracker" style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:8pt;text-transform:uppercase;letter-spacing:1px;color:#E87AAA;white-space:nowrap;text-decoration:none;">Get Full Access &rarr;</a>
    </div>
    <div class="brand-tag" aria-hidden="true">MY NEST CHAPTER</div>

    <div class="widget-header">
      <h1>30-Day Goal &amp; Habit Tracker</h1>
      <p class="tagline">Your system for showing up — 5 minutes a day.</p>
      <div class="day-strip">
        <span class="day-badge" id="dayBadge">Day 1 of 30</span>
        <span class="day-date" id="dayDate"></span>
      </div>
    </div>

    <nav class="tab-nav" role="tablist" aria-label="Tracker sections">
      <button role="tab" id="tab-setup" class="tab-btn active" aria-selected="true" aria-controls="panel-setup" onclick="switchTab('setup')">Setup</button>
      <button role="tab" id="tab-daily" class="tab-btn" aria-selected="false" aria-controls="panel-daily" onclick="switchTab('daily')">Daily</button>
      <button role="tab" id="tab-weekly" class="tab-btn" aria-selected="false" aria-controls="panel-weekly" onclick="switchTab('weekly')">Weekly</button>
      <button role="tab" id="tab-monthly" class="tab-btn" aria-selected="false" aria-controls="panel-monthly" onclick="switchTab('monthly')">Monthly</button>
    </nav>

    <main id="content" tabindex="-1">
      <div id="panel-setup" role="tabpanel" aria-labelledby="tab-setup"></div>
      <div id="panel-daily" role="tabpanel" aria-labelledby="tab-daily" hidden></div>
      <div id="panel-weekly" role="tabpanel" aria-labelledby="tab-weekly" hidden></div>
      <div id="panel-monthly" role="tabpanel" aria-labelledby="tab-monthly" hidden></div>
    </main>
  </div>

  <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-msg" id="modalMsg"></div>
      <div class="modal-btns" id="modalBtns"></div>
    </div>
  </div>

  <script>
    'use strict';
    const IS_DEMO = new URLSearchParams(window.location.search).has('demo');
    const STORAGE_KEY = IS_DEMO
      ? 'my-nest-chapter-goal-habit-tracker-demo-v1'
      : 'my-nest-chapter-goal-habit-tracker-v1';

    const LIFE_AREAS = [
      {key:'career',    label:'Career / Work',         desc:'Feeling useful, contributing, meaningful work or activities'},
      {key:'health',    label:'Health & Wellness',      desc:'Physical health, energy levels, sleep quality, stress management'},
      {key:'relationships', label:'Relationships',      desc:'Family, children, friends, co-workers, community'},
      {key:'financial', label:'Financial Security',     desc:'Comfortable with money, not stressed about finances'},
      {key:'romantic',  label:'Romantic Life',          desc:'In a relationship, trying to date'},
      {key:'growth',    label:'Personal Growth',        desc:'Learning new things, developing yourself, growing as a person'},
      {key:'home',      label:'Home Environment',       desc:'Comfortable housing, safe, repairs needed'},
      {key:'fun',       label:'Fun & Recreation',       desc:'Enjoying life, having things to look forward to, excitement'},
      {key:'spiritual', label:'Spiritual Well-Being',   desc:'Your values and beliefs'},
    ];

    const ALL_VALUES = ['Adventure','Authenticity','Balance','Beauty','Compassion','Community',
      'Creativity','Faith','Family','Freedom','Fun','Growth','Happiness','Health',
      'Joy','Kindness','Leadership','Loyalty','Respect','Service','Success','Wealth','Wisdom','Creativity'];

    const UNIQUE_VALUES = [...new Set(ALL_VALUES)].sort();

    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function makeDefaultState() {
      return {
        setupStep: 1,
        lifeAreas: {},
        lowAreas: ['','',''],
        focusArea: '',
        selectedValues: [],
        goals: [{text:'',specific:'',measurable:'',achievable:'',relevant:'',timebound:'',sentence:'',v1:'',v2:''},{text:'',specific:'',measurable:'',achievable:'',relevant:'',timebound:'',sentence:'',v1:'',v2:''},{text:'',specific:'',measurable:'',achievable:'',relevant:'',timebound:'',sentence:'',v1:'',v2:''}],
        actionPlans: [{target:'',w1:'',w2:'',w3:'',w4:'',obstacle:'',solution:''},{target:'',w1:'',w2:'',w3:'',w4:'',obstacle:'',solution:''},{target:'',w1:'',w2:'',w3:'',w4:'',obstacle:'',solution:''}],
        habits: [{text:'',when:'',where:'',trigger:'',action:'',duration:'',minimum:''},{text:'',when:'',where:'',trigger:'',action:'',duration:'',minimum:''},{text:'',when:'',where:'',trigger:'',action:'',duration:'',minimum:''}],
        setupComplete: false,
        startDate: null,
        days: {},
        weeklyReviews: {},
        monthlyReview: null,
        activeWeek: 1,
        goalOpen: [true, false, false],
        actionOpen: [true, false, false],
        habitOpen: [true, false, false],
      };
    }

    let state = load();

    if (IS_DEMO && !localStorage.getItem(STORAGE_KEY)) {
      state = makeDemoState();
      save();
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return makeDefaultState();
        const d = JSON.parse(raw);
        const def = makeDefaultState();
        // merge
        return Object.assign(def, d);
      } catch { return makeDefaultState(); }
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      catch(e) { if (e.name === 'QuotaExceededError') showToast('Storage full'); }
    }

    // ─── HELPERS ────────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2200);
    }

    function mncConfirm(title, msg, onConfirm) {
      const bd = document.getElementById('modalBackdrop');
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalMsg').textContent = msg;
      const btns = document.getElementById('modalBtns');
      btns.innerHTML = '';
      const cancel = document.createElement('button');
      cancel.className = 'btn-ghost';
      cancel.textContent = 'Cancel';
      cancel.onclick = () => { bd.classList.remove('open'); };
      const confirm = document.createElement('button');
      confirm.className = 'btn-primary';
      confirm.textContent = 'Confirm';
      confirm.style.padding = '12px 24px';
      confirm.onclick = () => { bd.classList.remove('open'); onConfirm(); };
      btns.appendChild(cancel);
      btns.appendChild(confirm);
      bd.classList.add('open');
      confirm.focus();
    }

    function todayKey() {
      return new Date().toISOString().split('T')[0];
    }

    function getDayNumber() {
      if (!state.startDate) return 1;
      const start = new Date(state.startDate + 'T00:00:00');
      const today = new Date();
      today.setHours(0,0,0,0);
      const diff = Math.round((today - start) / 86400000) + 1;
      return Math.max(1, Math.min(30, diff));
    }

    function getCurrentWeek() {
      const d = getDayNumber();
      return Math.min(4, Math.ceil(d / 7));
    }

    function getWeekDates(weekNum) {
      // week 1 = days 1-7, etc. Returns array of ISO date strings
      if (!state.startDate) return [];
      const startDay = (weekNum - 1) * 7; // 0-indexed
      const dates = [];
      const base = new Date(state.startDate + 'T00:00:00');
      for (let i = 0; i < 7; i++) {
        const d = new Date(base);
        d.setDate(base.getDate() + startDay + i);
        dates.push(d.toISOString().split('T')[0]);
      }
      return dates;
    }

    function formatDate(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
    }

    function getHabitCompletionRate(habitIdx) {
      if (!state.startDate) return 0;
      const dayN = getDayNumber();
      let done = 0;
      const base = new Date(state.startDate + 'T00:00:00');
      for (let i = 0; i < dayN; i++) {
        const d = new Date(base);
        d.setDate(base.getDate() + i);
        const key = d.toISOString().split('T')[0];
        const day = state.days[key];
        if (day && day.habits && day.habits[habitIdx]) {
          const s = day.habits[habitIdx].status;
          if (s === 'full' || s === 'minimum') done++;
        }
      }
      return dayN > 0 ? Math.round((done / dayN) * 100) : 0;
    }

    function getCurrentStreak() {
      if (!state.startDate) return 0;
      let streak = 0;
      const base = new Date(state.startDate + 'T00:00:00');
      const dayN = getDayNumber();
      // count from today backwards
      for (let i = dayN - 1; i >= 0; i--) {
        const d = new Date(base);
        d.setDate(base.getDate() + i);
        const key = d.toISOString().split('T')[0];
        const day = state.days[key];
        if (!day) break;
        const hasHabit = day.habits && day.habits.some(h => h.status === 'full' || h.status === 'minimum');
        const hasGoal = day.goals && day.goals.some(g => g.progress && g.progress !== '');
        if (hasHabit || hasGoal) streak++;
        else break;
      }
      return streak;
    }

    function fadeIn(el) {
      el.classList.remove('content-enter');
      void el.offsetWidth;
      el.classList.add('content-enter');
    }

    function makeDemoState() {
      const today = new Date();
      today.setHours(0,0,0,0);
      const start = new Date(today);
      start.setDate(today.getDate() - 19);
      const startDate = start.toISOString().split('T')[0];

      const h1 = ['full','full','minimum','full','full','full','skipped','full','minimum','full','full','full','skipped','full','full','full','minimum','skipped','full'];
      const h2 = ['full','full','full','full','minimum','skipped','full','full','full','full','minimum','full','full','skipped','full','full','full','full','minimum'];
      const h3 = ['minimum','full','full','skipped','full','full','full','minimum','skipped','full','full','minimum','full','full','skipped','full','full','minimum','full'];
      const energies = [7,6,8,7,5,8,6,7,7,6,8,7,5,7,8,6,7,6,8];

      const days = {};
      for (let i = 0; i < 19; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const key = d.toISOString().split('T')[0];
        days[key] = {
          energy: energies[i],
          goals: [
            {did:'',time:'',progress: i < 10 ? 'progress' : 'done'},
            {did:'',time:'',progress: h2[i] === 'full' ? 'done' : 'progress'},
            {did:'',time:'',progress:''}
          ],
          habits: [{status:h1[i]},{status:h2[i]},{status:h3[i]}],
          win: i % 7 === 0 ? 'Showed up even when I didn\'t feel like it' : '',
          tomorrow: ''
        };
      }

      return {
        setupStep: 5,
        lifeAreas: {health:6,growth:5,fun:4,relationships:7,career:5,financial:7,romantic:5,home:7,spiritual:6},
        lowAreas: ['health','growth','fun'],
        focusArea: 'health',
        selectedValues: ['Health','Balance','Growth','Joy','Freedom'],
        goals: [
          {text:'Take an art class',specific:'Sign up for a weekly painting class',measurable:'Attend 8 out of 8 sessions',achievable:'Yes',relevant:'Creative outlet I\'ve missed',timebound:'By end of month',sentence:'By day 30, I will have attended 8 painting sessions.',v1:'',v2:''},
          {text:'Morning walk routine',specific:'Walk 30 minutes every morning',measurable:'25 out of 30 days',achievable:'Yes',relevant:'Energy and health',timebound:'30 days',sentence:'By day 30, I will have walked on at least 25 mornings.',v1:'',v2:''},
          {text:'Declutter the spare room',specific:'Sort and donate items from spare room',measurable:'3 donation boxes',achievable:'One box per week',relevant:'Feel lighter at home',timebound:'End of month',sentence:'By day 30, I will have donated at least 3 boxes from the spare room.',v1:'',v2:''}
        ],
        actionPlans: [
          {target:'8 painting sessions',w1:'Sign up, attend first class',w2:'Sessions 2 and 3',w3:'Sessions 4 and 5',w4:'Final 3 sessions',obstacle:'Schedule conflict',solution:'Book in advance'},
          {target:'Walk 25 of 30 days',w1:'Set shoes out nightly',w2:'Walk Mon–Sat',w3:'Walk Mon–Sat',w4:'Walk Mon–Sat',obstacle:'Rain',solution:'Short walk around the block'},
          {target:'3 boxes donated',w1:'Sort one shelf',w2:'Fill first box',w3:'Fill second box',w4:'Final sweep and donate',obstacle:'Emotional attachment',solution:'Take a photo first'}
        ],
        habits: [
          {text:'Morning walk',when:'7am',where:'Neighborhood',trigger:'After morning coffee',action:'Put on shoes and step outside',duration:'30 minutes',minimum:'10-minute walk'},
          {text:'Read before bed',when:'9pm',where:'Bedroom',trigger:'After turning off TV',action:'Pick up book on nightstand',duration:'20 minutes',minimum:'5 pages'},
          {text:'5-minute journal',when:'Before bed',where:'Bedroom',trigger:'After setting alarm',action:'Write 3 things I noticed today',duration:'5 minutes',minimum:'1 sentence'}
        ],
        setupComplete: true,
        startDate: startDate,
        days: days,
        weeklyReviews: {},
        monthlyReview: null,
        activeWeek: 3,
        goalOpen: [true,false,false],
        actionOpen: [true,false,false],
        habitOpen: [true,false,false],
      };
    }

    // ─── TAB ROUTING ──────────────────────────────────────────────────────────
    let activeTab = 'setup';

    function switchTab(tab) {
      activeTab = tab;
      ['setup','daily','weekly','monthly'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('active', t === tab);
        document.getElementById('tab-' + t).setAttribute('aria-selected', t === tab ? 'true' : 'false');
        const p = document.getElementById('panel-' + t);
        if (t === tab) { p.hidden = false; } else { p.hidden = true; }
      });
      render();
    }

    function render() {
      if (IS_DEMO) {
        const b = document.getElementById('demoBanner');
        b.style.display = 'flex';
      }
      updateDayBadge();
      if (activeTab === 'setup') renderSetup();
      else if (activeTab === 'daily') renderDaily();
      else if (activeTab === 'weekly') renderWeekly();
      else if (activeTab === 'monthly') renderMonthly();
    }

    function updateDayBadge() {
      const dayN = getDayNumber();
      document.getElementById('dayBadge').textContent = state.startDate ? `Day ${dayN} of 30` : 'Not started yet';
      const now = new Date();
      document.getElementById('dayDate').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    }

    // ─── SETUP ────────────────────────────────────────────────────────────────
    function renderSetup() {
      const panel = document.getElementById('panel-setup');
      const step = state.setupStep;
      let html = `<div class="setup-progress" role="navigation" aria-label="Setup steps">`;
      const labels = ['Life Assessment','Values','Goals','Action Plan','Habits'];
      for (let i = 1; i <= 5; i++) {
        const cls = i < step ? 'done' : i === step ? 'active' : '';
        html += `<div class="setup-step-dot ${cls}" title="Step ${i}: ${labels[i-1]}" role="button" tabindex="0" onclick="goToSetupStep(${i})" onkeydown="if(event.key==='Enter'||event.key===' ')goToSetupStep(${i})" aria-label="Step ${i}: ${labels[i-1]}">${i < step ? '&#10003;' : i}</div>`;
        if (i < 5) html += `<div class="setup-step-connector" aria-hidden="true"></div>`;
      }
      html += `</div>`;
      panel.innerHTML = html;
      fadeIn(panel);

      const body = document.createElement('div');
      if (step === 1) body.innerHTML = renderStep1();
      else if (step === 2) body.innerHTML = renderStep2();
      else if (step === 3) body.innerHTML = renderStep3();
      else if (step === 4) body.innerHTML = renderStep4();
      else if (step === 5) body.innerHTML = renderStep5();
      panel.appendChild(body);
      wireSetupStep(step, panel);
    }

    function goToSetupStep(n) {
      if (n <= state.setupStep || n < state.setupStep) {
        state.setupStep = n;
        save();
        renderSetup();
      }
    }

    // Step 1: Life Assessment
    function renderStep1() {
      let html = `
        <div class="section-title">Step 1 of 5: Life Assessment</div>
        <p class="section-sub">Rate each area of your life honestly on a scale of 1 (needs attention) to 10 (thriving). This is just for you.</p>`;
      LIFE_AREAS.forEach(a => {
        const current = state.lifeAreas[a.key] || 0;
        html += `<div class="life-area-row">
          <div class="life-area-name">${esc(a.label)}</div>
          <div class="life-area-desc">${esc(a.desc)}</div>
          <div class="rating-row" role="group" aria-label="${esc(a.label)} rating">`;
        for (let i = 1; i <= 10; i++) {
          html += `<button class="rating-btn ${current === i ? 'selected' : ''}" onclick="setLifeArea('${a.key}',${i})" aria-label="${i} out of 10" aria-pressed="${current === i}">${i}</button>`;
        }
        html += `</div></div>`;
      });

      // low areas
      html += `<div class="section-title" style="margin-top:28px">Your 3 Lowest Areas</div>
        <p class="section-sub">Look at your ratings. Write your 3 lowest-rated areas below, then circle the ONE that would make the biggest difference.</p>`;
      for (let i = 0; i < 3; i++) {
        html += `<label for="lowArea${i}">${i+1}. Lowest area</label>
          <input type="text" id="lowArea${i}" value="${esc(state.lowAreas[i])}" oninput="state.lowAreas[${i}]=this.value;save()" placeholder="e.g. Health & Wellness">`;
      }
      html += `<label for="focusArea">My Starting Focus (circle one)</label>
        <input type="text" id="focusArea" value="${esc(state.focusArea)}" oninput="state.focusArea=this.value;save()" placeholder="The one area that will make the biggest difference">
        <div class="btn-row">
          <div></div>
          <button class="btn-primary" onclick="nextSetupStep()">Next: Values &rarr;</button>
        </div>`;
      return html;
    }

    function setLifeArea(key, val) {
      state.lifeAreas[key] = val;
      save();
      // re-render just ratings
      const rows = document.querySelectorAll('.rating-row');
      const idx = LIFE_AREAS.findIndex(a => a.key === key);
      if (rows[idx]) {
        rows[idx].querySelectorAll('.rating-btn').forEach((btn, i) => {
          btn.classList.toggle('selected', i + 1 === val);
          btn.setAttribute('aria-pressed', i + 1 === val ? 'true' : 'false');
        });
      }
    }

    // Step 2: Values
    function renderStep2() {
      const sel = state.selectedValues || [];
      let html = `
        <div class="section-title">Step 2 of 5: Values Clarification</div>
        <p class="section-sub">Select the 5 values that matter most to you right now. Then rank them — your #1 value becomes your decision-maker.</p>
        <div class="values-grid" id="valuesGrid">`;
      UNIQUE_VALUES.forEach(v => {
        const isSel = sel.includes(v);
        html += `<button class="value-chip ${isSel ? 'selected' : ''}" onclick="toggleValue('${esc(v)}')" aria-pressed="${isSel}">${esc(v)}</button>`;
      });
      html += `</div>`;
      if (sel.length > 0) {
        html += `<div class="values-ranked"><div class="section-title" style="font-size:10pt">My Top ${sel.length} Values — Ranked</div>`;
        sel.forEach((v, i) => {
          html += `<div class="ranked-item">
            <span class="ranked-num">${i+1}</span>
            <span class="ranked-label">${esc(v)}</span>
            <div class="rank-arrows">
              ${i > 0 ? `<button class="rank-arrow" onclick="moveValue(${i},-1)" aria-label="Move ${esc(v)} up">&#8593;</button>` : '<span style="width:28px"></span>'}
              ${i < sel.length-1 ? `<button class="rank-arrow" onclick="moveValue(${i},1)" aria-label="Move ${esc(v)} down">&#8595;</button>` : ''}
            </div>
          </div>`;
        });
        html += `</div>`;
      }
      html += `<p style="font-family:'Montserrat',sans-serif;font-size:9pt;color:#5A5A72;margin-top:12px">${sel.length}/5 values selected</p>
        <div class="btn-row">
          <button class="btn-ghost" onclick="prevSetupStep()">&larr; Back</button>
          <button class="btn-primary" onclick="nextSetupStep()">Next: Goals &rarr;</button>
        </div>`;
      return html;
    }

    function toggleValue(v) {
      const sel = state.selectedValues || [];
      const idx = sel.indexOf(v);
      if (idx === -1) {
        if (sel.length >= 5) { showToast('Max 5 values — remove one first'); return; }
        sel.push(v);
      } else {
        sel.splice(idx, 1);
      }
      state.selectedValues = sel;
      save();
      renderSetup();
    }

    function moveValue(i, dir) {
      const sel = state.selectedValues;
      const ni = i + dir;
      if (ni < 0 || ni >= sel.length) return;
      [sel[i], sel[ni]] = [sel[ni], sel[i]];
      save();
      renderSetup();
    }

    // Step 3: Goals
    function renderStep3() {
      let html = `<div class="section-title">Step 3 of 5: Your 3 Goals</div>
        <p class="section-sub">Set 3 clear, specific, value-aligned goals for the next 30 days. Use the SMART format so you know exactly what success looks like.</p>`;
      for (let i = 0; i < 3; i++) {
        const g = state.goals[i];
        const isOpen = state.goalOpen[i];
        const snippet = g.sentence ? `"${g.sentence.substring(0,48)}${g.sentence.length > 48 ? '...' : ''}"` : 'Not set yet';
        html += `<div class="goal-block" id="goalBlock${i}">
          <div class="goal-block-header" onclick="toggleGoalBlock(${i})" aria-expanded="${isOpen}" aria-controls="goalBody${i}">
            <span>Goal ${i+1} — ${esc(snippet)}</span>
            <span class="goal-block-chevron">${isOpen ? '&#9650;' : '&#9660;'}</span>
          </div>
          <div class="goal-block-body ${isOpen ? 'open' : ''}" id="goalBody${i}">
            <label for="goalText${i}">What do you want to achieve?</label>
            <textarea id="goalText${i}" rows="2" oninput="state.goals[${i}].text=this.value;save()" placeholder="Write it down, even if it's messy at first...">${esc(g.text)}</textarea>
            <div class="two-col">
              <div>
                <label for="goalSpec${i}">Specific</label>
                <div class="field-hint">Exactly what will you do?</div>
                <input type="text" id="goalSpec${i}" value="${esc(g.specific)}" oninput="state.goals[${i}].specific=this.value;save()" placeholder="I will...">
              </div>
              <div>
                <label for="goalMeas${i}">Measurable</label>
                <div class="field-hint">How will you know you did it?</div>
                <input type="text" id="goalMeas${i}" value="${esc(g.measurable)}" oninput="state.goals[${i}].measurable=this.value;save()" placeholder="I'll know when...">
              </div>
            </div>
            <div class="two-col">
              <div>
                <label for="goalAch${i}">Achievable</label>
                <div class="field-hint">What makes this realistic right now?</div>
                <input type="text" id="goalAch${i}" value="${esc(g.achievable)}" oninput="state.goals[${i}].achievable=this.value;save()" placeholder="It's realistic because...">
              </div>
              <div>
                <label for="goalRel${i}">Relevant</label>
                <div class="field-hint">Why does this matter to you?</div>
                <input type="text" id="goalRel${i}" value="${esc(g.relevant)}" oninput="state.goals[${i}].relevant=this.value;save()" placeholder="This matters because...">
              </div>
            </div>
            <label for="goalTime${i}">Time-Bound — When will you complete this?</label>
            <input type="text" id="goalTime${i}" value="${esc(g.timebound)}" oninput="state.goals[${i}].timebound=this.value;save()" placeholder="By [date], I will have...">
            <label for="goalSent${i}">Write your complete goal in one clear sentence</label>
            <textarea id="goalSent${i}" rows="2" oninput="state.goals[${i}].sentence=this.value;save()" placeholder="By [date], I will [specific action] as measured by [metric].">${esc(g.sentence)}</textarea>
            <label>Values Check — Which 2 of your top values does this connect to?</label>
            <div class="two-col">
              <input type="text" value="${esc(g.v1)}" oninput="state.goals[${i}].v1=this.value;save()" placeholder="Value 1">
              <input type="text" value="${esc(g.v2)}" oninput="state.goals[${i}].v2=this.value;save()" placeholder="Value 2">
            </div>
          </div>
        </div>`;
      }
      html += `<div class="btn-row">
        <button class="btn-ghost" onclick="prevSetupStep()">&larr; Back</button>
        <button class="btn-primary" onclick="nextSetupStep()">Next: Action Plan &rarr;</button>
      </div>`;
      return html;
    }

    function toggleGoalBlock(i) {
      state.goalOpen[i] = !state.goalOpen[i];
      save();
      renderSetup();
    }

    // Step 4: Action Plans
    function renderStep4() {
      let html = `<div class="section-title">Step 4 of 5: Monthly Action Plan</div>
        <p class="section-sub">Break each goal into 4 weekly actions. No more "I don't know where to start" — you'll know exactly what to do each week.</p>`;
      for (let i = 0; i < 3; i++) {
        const a = state.actionPlans[i];
        const goalLabel = state.goals[i].sentence || `Goal ${i+1}`;
        const isOpen = state.actionOpen[i];
        html += `<div class="goal-block" id="actionBlock${i}">
          <div class="goal-block-header" onclick="toggleActionBlock(${i})" aria-expanded="${isOpen}">
            <span>Goal ${i+1} — ${esc(goalLabel.substring(0,40))}${goalLabel.length > 40 ? '...' : ''}</span>
            <span class="goal-block-chevron">${isOpen ? '&#9650;' : '&#9660;'}</span>
          </div>
          <div class="goal-block-body ${isOpen ? 'open' : ''}" id="actionBody${i}">
            <label for="at${i}">My 30-day target</label>
            <div class="field-hint">What can you realistically accomplish in 30 days? (Not the entire goal — just this month.)</div>
            <textarea id="at${i}" rows="2" oninput="state.actionPlans[${i}].target=this.value;save()" placeholder="In 30 days, I will have...">${esc(a.target)}</textarea>
            <div class="two-col">
              <div><label for="aw1${i}">Week 1 — What will you DO?</label>
              <input type="text" id="aw1${i}" value="${esc(a.w1)}" oninput="state.actionPlans[${i}].w1=this.value;save()" placeholder="Specific action..."></div>
              <div><label for="aw2${i}">Week 2</label>
              <input type="text" id="aw2${i}" value="${esc(a.w2)}" oninput="state.actionPlans[${i}].w2=this.value;save()" placeholder="Specific action..."></div>
            </div>
            <div class="two-col">
              <div><label for="aw3${i}">Week 3</label>
              <input type="text" id="aw3${i}" value="${esc(a.w3)}" oninput="state.actionPlans[${i}].w3=this.value;save()" placeholder="Specific action..."></div>
              <div><label for="aw4${i}">Week 4</label>
              <input type="text" id="aw4${i}" value="${esc(a.w4)}" oninput="state.actionPlans[${i}].w4=this.value;save()" placeholder="Specific action..."></div>
            </div>
            <label for="aob${i}">Biggest obstacle — be honest</label>
            <input type="text" id="aob${i}" value="${esc(a.obstacle)}" oninput="state.actionPlans[${i}].obstacle=this.value;save()" placeholder="The thing most likely to stop me is...">
            <label for="asol${i}">How I'll handle it</label>
            <input type="text" id="asol${i}" value="${esc(a.solution)}" oninput="state.actionPlans[${i}].solution=this.value;save()" placeholder="When that happens, I will...">
          </div>
        </div>`;
      }
      html += `<div class="btn-row">
        <button class="btn-ghost" onclick="prevSetupStep()">&larr; Back</button>
        <button class="btn-primary" onclick="nextSetupStep()">Next: Habits &rarr;</button>
      </div>`;
      return html;
    }

    function toggleActionBlock(i) {
      state.actionOpen[i] = !state.actionOpen[i];
      save();
      renderSetup();
    }

    // Step 5: Habits
    function renderStep5() {
      let html = `<div class="section-title">Step 5 of 5: Your 3 Habits</div>
        <p class="section-sub">Choose 3 habits that directly support your goals. Design each one to fit your real daily routine — not the ideal version of your day.</p>`;
      for (let i = 0; i < 3; i++) {
        const h = state.habits[i];
        const isOpen = state.habitOpen[i];
        const trigger = h.trigger || '___';
        const action = h.action || '___';
        const duration = h.duration || '___';
        html += `<div class="goal-block">
          <div class="goal-block-header" onclick="toggleHabitBlock(${i})">
            <span>Habit ${i+1} — ${esc(h.text || 'Not set yet')}</span>
            <span class="goal-block-chevron">${isOpen ? '&#9650;' : '&#9660;'}</span>
          </div>
          <div class="goal-block-body ${isOpen ? 'open' : ''}">
            <label for="htext${i}">What habit will move you forward on Goal ${i+1}?</label>
            <input type="text" id="htext${i}" value="${esc(h.text)}" oninput="state.habits[${i}].text=this.value;save();updateHabitPreview(${i})" placeholder="e.g. Walk for 20 minutes">
            <div class="two-col">
              <div><label for="hwhen${i}">When (time of day)</label>
              <input type="text" id="hwhen${i}" value="${esc(h.when)}" oninput="state.habits[${i}].when=this.value;save()" placeholder="e.g. After morning coffee"></div>
              <div><label for="hwhere${i}">Where</label>
              <input type="text" id="hwhere${i}" value="${esc(h.where)}" oninput="state.habits[${i}].where=this.value;save()" placeholder="e.g. In the kitchen"></div>
            </div>
            <label>Habit Stacking — Link it to something you already do</label>
            <div class="two-col">
              <div><label for="htrig${i}">After I</label>
              <input type="text" id="htrig${i}" value="${esc(h.trigger)}" oninput="state.habits[${i}].trigger=this.value;save();updateHabitPreview(${i})" placeholder="e.g. pour my morning coffee"></div>
              <div><label for="hact${i}">I will</label>
              <input type="text" id="hact${i}" value="${esc(h.action)}" oninput="state.habits[${i}].action=this.value;save();updateHabitPreview(${i})" placeholder="e.g. walk for 20 minutes"></div>
            </div>
            <label for="hdur${i}">For how long</label>
            <input type="text" id="hdur${i}" value="${esc(h.duration)}" oninput="state.habits[${i}].duration=this.value;save();updateHabitPreview(${i})" placeholder="e.g. 20 minutes">
            <div class="habit-sentence-preview" id="habitPreview${i}">
              After I <strong>${esc(trigger)}</strong>, I will <strong>${esc(action)}</strong> for <strong>${esc(duration)}</strong>.
            </div>
            <label for="hmin${i}">Minimum version for rough days</label>
            <div class="field-hint">The smallest possible version that still counts. Example: full habit is 30-min walk — minimum is 5 minutes around the block.</div>
            <input type="text" id="hmin${i}" value="${esc(h.minimum)}" oninput="state.habits[${i}].minimum=this.value;save()" placeholder="e.g. Walk to the end of the driveway and back">
          </div>
        </div>`;
      }
      html += `<div class="btn-row" style="margin-top:28px">
        <button class="btn-ghost" onclick="prevSetupStep()">&larr; Back</button>
        <button class="btn-primary" onclick="completeSetup()">Start My 30 Days &rarr;</button>
      </div>`;
      return html;
    }

    function toggleHabitBlock(i) {
      state.habitOpen[i] = !state.habitOpen[i];
      save();
      renderSetup();
    }

    function updateHabitPreview(i) {
      const h = state.habits[i];
      const el = document.getElementById('habitPreview' + i);
      if (!el) return;
      const t = h.trigger || '___';
      const a = h.action || '___';
      const d = h.duration || '___';
      el.innerHTML = `After I <strong>${esc(t)}</strong>, I will <strong>${esc(a)}</strong> for <strong>${esc(d)}</strong>.`;
    }

    function nextSetupStep() {
      state.setupStep = Math.min(5, state.setupStep + 1);
      save();
      renderSetup();
      document.getElementById('content').scrollIntoView({behavior:'smooth'});
    }

    function prevSetupStep() {
      state.setupStep = Math.max(1, state.setupStep - 1);
      save();
      renderSetup();
      document.getElementById('content').scrollIntoView({behavior:'smooth'});
    }

    function completeSetup() {
      state.setupComplete = true;
      if (!state.startDate) state.startDate = todayKey();
      save();
      showToast('Setup complete — Day 1 starts today');
      switchTab('daily');
    }

    function wireSetupStep(step, panel) {
      // nothing extra needed — all wired inline
    }

    // ─── DAILY ──────────────────────────────────────────────────────────────
    function renderDaily() {
      const panel = document.getElementById('panel-daily');
      if (!state.setupComplete) {
        panel.innerHTML = `<div class="empty-state"><div class="empty-brand" aria-hidden="true">MY NEST CHAPTER</div><div class="empty-msg">Complete the 5-step setup first to start tracking.</div></div>
          <button class="btn-primary" style="margin-top:16px" onclick="switchTab('setup')">Go to Setup &rarr;</button>`;
        fadeIn(panel);
        return;
      }

      const key = todayKey();
      if (!state.days[key]) {
        state.days[key] = { energy: 0, goals: [{did:'',time:'',progress:''},{did:'',time:'',progress:''},{did:'',time:'',progress:''}], habits: [{status:''},{status:''},{status:''}], win: '', tomorrow: '' };
        save();
      }
      const day = state.days[key];

      let html = `<div class="section-title">Daily Check-In</div>
        <p class="section-sub">5 minutes. One entry per day. Be honest — this is just for you.</p>`;

      // Energy
      html += `<div class="energy-row">
        <div class="energy-label" id="energyLabel">My Energy Today</div>
        <div class="energy-btns" role="group" aria-labelledby="energyLabel">`;
      for (let i = 1; i <= 10; i++) {
        html += `<button class="energy-btn ${day.energy === i ? 'selected' : ''}" onclick="setEnergy(${i})" aria-label="${i} out of 10" aria-pressed="${day.energy === i}">${i}</button>`;
      }
      html += `</div></div>`;

      // Goals
      html += `<div class="section-title" style="font-size:11pt;margin-top:4px">My Goals</div>`;
      for (let i = 0; i < 3; i++) {
        const g = state.goals[i];
        const dg = day.goals[i] || {did:'',time:'',progress:''};
        const label = g.sentence || g.text || `Goal ${i+1}`;
        html += `<div class="goal-track-block">
          <div class="goal-track-header">Goal ${i+1}: ${esc(label.substring(0,60))}${label.length > 60 ? '...' : ''}</div>
          <div class="goal-track-body">
            <label for="gdid${i}">What I did today</label>
            <textarea id="gdid${i}" rows="2" oninput="saveDayGoal(${i},'did',this.value)" placeholder="Describe what you worked on...">${esc(dg.did)}</textarea>
            <label for="gtime${i}">Time spent</label>
            <input type="text" id="gtime${i}" value="${esc(dg.time)}" oninput="saveDayGoal(${i},'time',this.value)" placeholder="e.g. 30 minutes">
            <label>Progress</label>
            <div class="progress-options" role="group" aria-label="Goal ${i+1} progress">
              <button class="progress-opt ${dg.progress==='started'?'selected-started':''}" onclick="saveDayGoal(${i},'progress','started')" aria-pressed="${dg.progress==='started'}">Started</button>
              <button class="progress-opt ${dg.progress==='progress'?'selected-progress':''}" onclick="saveDayGoal(${i},'progress','progress')" aria-pressed="${dg.progress==='progress'}">In Progress</button>
              <button class="progress-opt ${dg.progress==='done'?'selected-done':''}" onclick="saveDayGoal(${i},'progress','done')" aria-pressed="${dg.progress==='done'}">Done</button>
            </div>
          </div>
        </div>`;
      }

      // Habits
      html += `<div class="section-title" style="font-size:11pt;margin-top:24px">My Habits</div>`;
      for (let i = 0; i < 3; i++) {
        const h = state.habits[i];
        const dh = day.habits[i] || {status:''};
        const label = h.text || `Habit ${i+1}`;
        html += `<div class="habit-track-block">
          <span class="habit-track-name">${esc(label)}</span>
          <div class="habit-opts" role="group" aria-label="${esc(label)} status">
            <button class="habit-opt ${dh.status==='full'?'sel-full':''}" onclick="saveDayHabit(${i},'full')" aria-pressed="${dh.status==='full'}">Full</button>
            <button class="habit-opt ${dh.status==='minimum'?'sel-min':''}" onclick="saveDayHabit(${i},'minimum')" aria-pressed="${dh.status==='minimum'}">Minimum</button>
            <button class="habit-opt ${dh.status==='skipped'?'sel-skip':''}" onclick="saveDayHabit(${i},'skipped')" aria-pressed="${dh.status==='skipped'}">Skipped</button>
          </div>
        </div>`;
      }

      // Win + tomorrow
      html += `<div style="margin-top:24px">
        <label for="dayWin">One win from today (even tiny ones count)</label>
        <textarea id="dayWin" rows="2" oninput="saveDayField('win',this.value)" placeholder="Something I did, finished, or showed up for...">${esc(day.win)}</textarea>
        <label for="dayTomorrow">Tomorrow I'm focusing on</label>
        <textarea id="dayTomorrow" rows="2" oninput="saveDayField('tomorrow',this.value)" placeholder="The one thing I'll make sure to do tomorrow...">${esc(day.tomorrow)}</textarea>
      </div>
      <div class="btn-row" style="margin-top:20px">
        <button class="btn-ghost" onclick="viewPreviousDay()">View Previous Day</button>
        <button class="btn-primary" onclick="markDaySaved()">Save Today</button>
      </div>`;

      panel.innerHTML = html;
      fadeIn(panel);
    }

    function setEnergy(val) {
      const key = todayKey();
      if (!state.days[key]) return;
      state.days[key].energy = val;
      save();
      document.querySelectorAll('.energy-btn').forEach((btn, i) => {
        btn.classList.toggle('selected', i + 1 === val);
        btn.setAttribute('aria-pressed', i + 1 === val ? 'true' : 'false');
      });
    }

    function saveDayGoal(i, field, val) {
      const key = todayKey();
      if (!state.days[key]) return;
      state.days[key].goals[i][field] = val;
      save();
      if (field === 'progress') {
        // update buttons
        const groups = document.querySelectorAll('.progress-options');
        if (groups[i]) {
          groups[i].querySelectorAll('.progress-opt').forEach(btn => {
            btn.className = 'progress-opt';
            btn.setAttribute('aria-pressed','false');
          });
          const opts = ['started','progress','done'];
          const btnIdx = opts.indexOf(val);
          if (btnIdx >= 0 && groups[i].children[btnIdx]) {
            groups[i].children[btnIdx].classList.add('selected-' + val);
            groups[i].children[btnIdx].setAttribute('aria-pressed','true');
          }
        }
      }
    }

    function saveDayHabit(i, status) {
      const key = todayKey();
      if (!state.days[key]) return;
      state.days[key].habits[i].status = status;
      save();
      const blocks = document.querySelectorAll('.habit-track-block');
      if (blocks[i]) {
        const btns = blocks[i].querySelectorAll('.habit-opt');
        btns.forEach(b => { b.className = 'habit-opt'; b.setAttribute('aria-pressed','false'); });
        const map = ['full','minimum','skipped'];
        const cls = ['sel-full','sel-min','sel-skip'];
        const idx = map.indexOf(status);
        if (idx >= 0 && btns[idx]) { btns[idx].classList.add(cls[idx]); btns[idx].setAttribute('aria-pressed','true'); }
      }
    }

    function saveDayField(field, val) {
      const key = todayKey();
      if (!state.days[key]) return;
      state.days[key][field] = val;
      save();
    }

    function markDaySaved() {
      save();
      showToast('Day saved');
    }

    function viewPreviousDay() {
      showToast('Coming soon — view any past day');
    }

    // ─── WEEKLY ─────────────────────────────────────────────────────────────
    function renderWeekly() {
      const panel = document.getElementById('panel-weekly');
      if (!state.setupComplete) {
        panel.innerHTML = `<div class="empty-state"><div class="empty-brand" aria-hidden="true">MY NEST CHAPTER</div><div class="empty-msg">Complete the 5-step setup to unlock weekly tracking.</div></div>`;
        fadeIn(panel);
        return;
      }

      const w = state.activeWeek || getCurrentWeek();
      state.activeWeek = w;
      const dates = getWeekDates(w);
      const dayN = getDayNumber();
      const weekStart = (w - 1) * 7 + 1;
      const weekEnd = Math.min(w * 7, 30);

      let html = `<div class="section-title">Weekly Tracker</div>
        <p class="section-sub">See your week at a glance — goals and habits side by side.</p>
        <div class="week-selector" role="group" aria-label="Select week">`;
      for (let i = 1; i <= 4; i++) {
        html += `<button class="week-btn ${w === i ? 'active' : ''}" onclick="setActiveWeek(${i})" aria-pressed="${w === i}">Week ${i}</button>`;
      }
      html += `</div>`;

      if (dates.length) {
        html += `<p style="font-family:'Arial',sans-serif;font-size:10pt;color:#5A5A72;margin-bottom:16px">Days ${weekStart}–${weekEnd} &nbsp;|&nbsp; ${formatDate(dates[0])} to ${formatDate(dates[6])}</p>`;
      }

      // Goal grid
      html += `<div class="section-title" style="font-size:10pt">Goal Progress</div>
        <div style="overflow-x:auto"><table class="tracker-grid" aria-label="Weekly goal progress">
          <thead><tr>
            <th class="row-label">Goal</th>`;
      DAYS.forEach(d => { html += `<th>${d}</th>`; });
      html += `</tr></thead><tbody>`;
      for (let gi = 0; gi < 3; gi++) {
        const gLabel = state.goals[gi].text ? state.goals[gi].text.substring(0,20) + (state.goals[gi].text.length > 20 ? '...' : '') : `Goal ${gi+1}`;
        html += `<tr><td class="row-label">${esc(gLabel)}</td>`;
        dates.forEach((dateKey, di) => {
          const dayData = state.days[dateKey];
          const prog = dayData && dayData.goals && dayData.goals[gi] ? dayData.goals[gi].progress : '';
          const dayNum = weekStart + di;
          if (dayNum > dayN) {
            html += `<td class="cell-empty">—</td>`;
          } else if (prog === 'started') {
            html += `<td><span class="cell-s" title="Started">S</span></td>`;
          } else if (prog === 'progress') {
            html += `<td><span class="cell-p" title="In Progress">P</span></td>`;
          } else if (prog === 'done') {
            html += `<td><span class="cell-d" title="Done">D</span></td>`;
          } else {
            html += `<td class="cell-empty">·</td>`;
          }
        });
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;

      // Habit grid
      html += `<div class="section-title" style="font-size:10pt;margin-top:24px">Habit Progress</div>
        <div style="overflow-x:auto"><table class="tracker-grid" aria-label="Weekly habit progress">
          <thead><tr>
            <th class="row-label">Habit</th>`;
      DAYS.forEach(d => { html += `<th>${d}</th>`; });
      html += `</tr></thead><tbody>`;
      for (let hi = 0; hi < 3; hi++) {
        const hLabel = state.habits[hi].text ? state.habits[hi].text.substring(0,20) + (state.habits[hi].text.length > 20 ? '...' : '') : `Habit ${hi+1}`;
        html += `<tr><td class="row-label">${esc(hLabel)}</td>`;
        dates.forEach((dateKey, di) => {
          const dayData = state.days[dateKey];
          const status = dayData && dayData.habits && dayData.habits[hi] ? dayData.habits[hi].status : '';
          const dayNum = weekStart + di;
          if (dayNum > dayN) {
            html += `<td class="cell-empty">—</td>`;
          } else if (status === 'full') {
            html += `<td><span class="cell-fv" title="Full version">FV</span></td>`;
          } else if (status === 'minimum') {
            html += `<td><span class="cell-mv" title="Minimum version">MV</span></td>`;
          } else if (status === 'skipped') {
            html += `<td><span class="cell-sk" title="Skipped">S</span></td>`;
          } else {
            html += `<td class="cell-empty">·</td>`;
          }
        });
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;

      // Legend
      html += `<div class="habit-grid-legend" style="margin-top:12px">
        <span><span class="legend-dot" style="background:#E87AAA"></span>Done / Full</span>
        <span><span class="legend-dot" style="background:#C4B0E8"></span>Progress / Minimum</span>
        <span><span class="legend-dot" style="background:#A8C5DA"></span>Started</span>
        <span><span class="legend-dot" style="background:#D3D3D3"></span>Skipped</span>
      </div>`;

      // Weekly Review
      const rev = state.weeklyReviews[w] || {};
      html += `<div class="section-title" style="margin-top:32px">Weekly Review — Week ${w}</div>
        <p class="section-sub">Take 15 minutes on Sunday. This is where you spot patterns and plan ahead.</p>`;

      for (let i = 0; i < 3; i++) {
        const r = (rev.goals && rev.goals[i]) || {planned:'',actual:'',hit:''};
        const gLabel = state.goals[i].text || `Goal ${i+1}`;
        html += `<div class="review-block">
          <div class="review-block-title">Goal ${i+1}: ${esc(gLabel.substring(0,50))}</div>
          <label for="wrplan${i}w${w}">What I planned</label>
          <input type="text" id="wrplan${i}w${w}" value="${esc(r.planned)}" oninput="saveWeeklyReview(${w},'goals',${i},'planned',this.value)" placeholder="What I set out to do this week...">
          <label for="wractual${i}w${w}">What I actually did</label>
          <textarea id="wractual${i}w${w}" rows="2" oninput="saveWeeklyReview(${w},'goals',${i},'actual',this.value)" placeholder="What actually happened...">${esc(r.actual)}</textarea>
          <label>Did I hit my target?</label>
          <div class="hit-options" role="group" aria-label="Goal ${i+1} target">
            <button class="hit-opt ${r.hit==='yes'?'sel-yes':''}" onclick="saveWeeklyReview(${w},'goals',${i},'hit','yes')" aria-pressed="${r.hit==='yes'}">Yes</button>
            <button class="hit-opt ${r.hit==='progress'?'sel-prog':''}" onclick="saveWeeklyReview(${w},'goals',${i},'hit','progress')" aria-pressed="${r.hit==='progress'}">Progress</button>
            <button class="hit-opt ${r.hit==='no'?'sel-no':''}" onclick="saveWeeklyReview(${w},'goals',${i},'hit','no')" aria-pressed="${r.hit==='no'}">No</button>
          </div>
        </div>`;
      }

      for (let i = 0; i < 3; i++) {
        const r = (rev.habits && rev.habits[i]) || {days:0,rating:''};
        const hLabel = state.habits[i].text || `Habit ${i+1}`;
        html += `<div class="review-block">
          <div class="review-block-title">Habit ${i+1}: ${esc(hLabel.substring(0,50))}</div>
          <label for="wrhdays${i}w${w}">Days completed this week</label>
          <input type="number" id="wrhdays${i}w${w}" value="${esc(r.days)}" min="0" max="7" oninput="saveWeeklyReview(${w},'habits',${i},'days',this.value)" style="max-width:100px">
          <label>How did it go?</label>
          <div class="habit-rating" role="group" aria-label="${esc(hLabel)} rating">
            <button class="hrating-opt ${r.rating==='good'?'sel-good':''}" onclick="saveWeeklyReview(${w},'habits',${i},'rating','good')" aria-pressed="${r.rating==='good'}">Good</button>
            <button class="hrating-opt ${r.rating==='okay'?'sel-okay':''}" onclick="saveWeeklyReview(${w},'habits',${i},'rating','okay')" aria-pressed="${r.rating==='okay'}">Okay</button>
            <button class="hrating-opt ${r.rating==='work'?'sel-work':''}" onclick="saveWeeklyReview(${w},'habits',${i},'rating','work')" aria-pressed="${r.rating==='work'}">Need Work</button>
          </div>
        </div>`;
      }

      const wins = rev.wins || ['','',''];
      html += `<div class="section-title" style="font-size:10pt;margin-top:8px">Reflection</div>
        <label>My 3 wins this week</label>
        <input type="text" value="${esc(wins[0])}" oninput="saveWeeklyWin(${w},0,this.value)" placeholder="Win 1...">
        <input type="text" value="${esc(wins[1])}" oninput="saveWeeklyWin(${w},1,this.value)" placeholder="Win 2...">
        <input type="text" value="${esc(wins[2])}" oninput="saveWeeklyWin(${w},2,this.value)" placeholder="Win 3...">
        <label for="wrhard${w}">What made this week hard</label>
        <textarea id="wrhard${w}" rows="2" oninput="saveWeeklyField(${w},'hard',this.value)" placeholder="Be honest — what got in the way?">${esc(rev.hard||'')}</textarea>
        <label for="wrlearned${w}">What I learned</label>
        <textarea id="wrlearned${w}" rows="2" oninput="saveWeeklyField(${w},'learned',this.value)" placeholder="About myself, my habits, my goals...">${esc(rev.learned||'')}</textarea>
        <label for="wrchanging${w}">Next week I'm changing</label>
        <input type="text" id="wrchanging${w}" value="${esc(rev.changing||'')}" oninput="saveWeeklyField(${w},'changing',this.value)" placeholder="One thing I'll do differently...">
        <label for="wrfocus${w}">My main focus</label>
        <input type="text" id="wrfocus${w}" value="${esc(rev.focus||'')}" oninput="saveWeeklyField(${w},'focus',this.value)" placeholder="The one priority for next week...">
        <div style="margin-top:20px">
          <button class="btn-primary" onclick="saveWeeklyNow(${w})">Save Week ${w} Review</button>
        </div>`;

      panel.innerHTML = html;
      fadeIn(panel);
    }

    function setActiveWeek(w) {
      state.activeWeek = w;
      save();
      renderWeekly();
    }

    function saveWeeklyReview(week, type, idx, field, val) {
      if (!state.weeklyReviews[week]) state.weeklyReviews[week] = {};
      const rev = state.weeklyReviews[week];
      if (!rev[type]) rev[type] = [{},{},{}];
      rev[type][idx][field] = val;
      save();
      if (field === 'hit' || field === 'rating') renderWeekly();
    }

    function saveWeeklyWin(week, idx, val) {
      if (!state.weeklyReviews[week]) state.weeklyReviews[week] = {};
      if (!state.weeklyReviews[week].wins) state.weeklyReviews[week].wins = ['','',''];
      state.weeklyReviews[week].wins[idx] = val;
      save();
    }

    function saveWeeklyField(week, field, val) {
      if (!state.weeklyReviews[week]) state.weeklyReviews[week] = {};
      state.weeklyReviews[week][field] = val;
      save();
    }

    function saveWeeklyNow(w) {
      save();
      showToast('Week ' + w + ' review saved');
    }

    // ─── MONTHLY ────────────────────────────────────────────────────────────
    function renderMonthly() {
      const panel = document.getElementById('panel-monthly');
      if (!state.setupComplete) {
        panel.innerHTML = `<div class="empty-state"><div class="empty-brand" aria-hidden="true">MY NEST CHAPTER</div><div class="empty-msg">Complete the 5-step setup to unlock monthly tracking.</div></div>`;
        fadeIn(panel);
        return;
      }

      const dayN = getDayNumber();
      const streak = getCurrentStreak();

      let html = '';

      if (dayN >= 30) {
        const h1rate = getHabitCompletionRate(0);
        const h2rate = getHabitCompletionRate(1);
        const h3rate = getHabitCompletionRate(2);
        const avgRate = Math.round((h1rate + h2rate + h3rate) / 3);
        html += `<div style="background:#252535;padding:32px;margin-bottom:32px;text-align:center;">
          <p style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.18em;color:#A8C5DA;margin:0 0 10px;">YOU DID IT</p>
          <p style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.5rem;color:#FFF8EE;margin:0 0 14px;text-transform:uppercase;letter-spacing:0.5px;">30 Days. Done.</p>
          <p style="font-family:'Arial',sans-serif;font-size:11pt;color:#D3D3D3;line-height:1.7;margin:0 0 28px;max-width:380px;margin-left:auto;margin-right:auto;">You showed up for yourself for an entire month. That matters more than the numbers — but the numbers are worth seeing.</p>
          <div style="display:flex;gap:0;border:1px solid rgba(255,255,255,0.12);margin-bottom:28px;">
            <div style="flex:1;padding:16px 8px;text-align:center;border-right:1px solid rgba(255,255,255,0.12);">
              <div style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.6rem;color:#E87AAA;">${streak}</div>
              <div style="font-family:'Arial',sans-serif;font-size:8pt;color:#A8C5DA;text-transform:uppercase;letter-spacing:1px;">Streak</div>
            </div>
            <div style="flex:1;padding:16px 8px;text-align:center;border-right:1px solid rgba(255,255,255,0.12);">
              <div style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.6rem;color:#E87AAA;">${avgRate}%</div>
              <div style="font-family:'Arial',sans-serif;font-size:8pt;color:#A8C5DA;text-transform:uppercase;letter-spacing:1px;">Avg Habits</div>
            </div>
            <div style="flex:1;padding:16px 8px;text-align:center;">
              <div style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.6rem;color:#E87AAA;">30</div>
              <div style="font-family:'Arial',sans-serif;font-size:8pt;color:#A8C5DA;text-transform:uppercase;letter-spacing:1px;">Days</div>
            </div>
          </div>
          <p style="font-family:'Arial',sans-serif;font-size:10pt;color:#D3D3D3;line-height:1.6;margin:0 0 24px;font-style:italic;">"One month doesn't change everything. But it proves something — that you can." — Cece</p>
          <button class="btn-primary" onclick="resetTracker()" style="display:inline-block;">Start a New Month &rarr;</button>
          <p style="font-family:'Arial',sans-serif;font-size:9pt;color:#A8C5DA;margin:12px 0 0;line-height:1.5;">Your goals, habits, and values stay. Only your daily tracking resets.</p>
        </div>`;
      }

      html += `<div class="section-title">Monthly Overview</div>
        <p class="section-sub">Your visual proof of consistency. One mark per day, one month at a time.</p>`;

      // Stats
      html += `<div class="stats-bar" aria-label="Month stats">
        <div class="stat-item"><span class="stat-num" aria-live="polite" aria-atomic="true">${dayN}</span><span class="stat-label">Day</span></div>
        <div class="stat-item"><span class="stat-num">${streak}</span><span class="stat-label">Streak</span></div>
        <div class="stat-item"><span class="stat-num">${getHabitCompletionRate(0)}%</span><span class="stat-label">Habit 1</span></div>
        <div class="stat-item"><span class="stat-num">${getHabitCompletionRate(1)}%</span><span class="stat-label">Habit 2</span></div>
        <div class="stat-item"><span class="stat-num">${getHabitCompletionRate(2)}%</span><span class="stat-label">Habit 3</span></div>
      </div>`;

      // Habit grids
      html += `<div class="section-title" style="font-size:10pt">30-Day Habit Grid</div>`;
      html += `<div class="habit-grid-legend" style="margin-bottom:16px">
        <span><span class="legend-dot" style="background:#E87AAA"></span>Full</span>
        <span><span class="legend-dot" style="background:#C4B0E8"></span>Minimum</span>
        <span><span class="legend-dot" style="background:#D3D3D3"></span>Skipped</span>
        <span><span class="legend-dot" style="background:#F5F5F0;border:1px solid #D3D3D3"></span>Future</span>
      </div>`;

      for (let hi = 0; hi < 3; hi++) {
        const hLabel = state.habits[hi].text || `Habit ${hi+1}`;
        const rate = getHabitCompletionRate(hi);
        html += `<div class="habit-grid-section">
          <div class="habit-grid-title">${esc(hLabel)} — ${rate}% complete</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-track" role="progressbar" aria-valuenow="${rate}" aria-valuemin="0" aria-valuemax="100" aria-label="${esc(hLabel)} completion">
              <div class="progress-bar-fill" style="width:${rate}%"></div>
            </div>
          </div>
          <div class="month-grid" role="grid" aria-label="${esc(hLabel)} 30-day grid">`;
        DAYS.forEach(d => {
          html += `<div class="month-grid-header" role="columnheader">${d}</div>`;
        });

        // We start from day 1. Get the day of week of startDate.
        const startDow = state.startDate ? new Date(state.startDate + 'T00:00:00').getDay() : 0; // 0=Sun
        const base = state.startDate ? new Date(state.startDate + 'T00:00:00') : new Date();
        // Fill blanks before day 1
        for (let b = 0; b < startDow; b++) {
          html += `<div class="month-grid-cell" aria-hidden="true"></div>`;
        }
        for (let d = 1; d <= 30; d++) {
          const dd = new Date(base);
          dd.setDate(base.getDate() + d - 1);
          const dateKey = dd.toISOString().split('T')[0];
          const dayData = state.days[dateKey];
          const status = dayData && dayData.habits && dayData.habits[hi] ? dayData.habits[hi].status : '';
          let cls = 'mgc-empty';
          let label = `${d}`;
          if (d > dayN) { cls = 'mgc-future'; }
          else if (status === 'full') { cls = 'mgc-fv'; }
          else if (status === 'minimum') { cls = 'mgc-mv'; }
          else if (status === 'skipped') { cls = 'mgc-sk'; }
          html += `<div class="month-grid-cell ${cls}" role="gridcell" aria-label="Day ${d}: ${status || 'not tracked'}">${label}</div>`;
        }
        html += `</div></div>`;
      }

      // Monthly Review (always show)
      const mr = state.monthlyReview || {};
      html += `<div class="section-title" style="margin-top:36px">Monthly Review</div>
        <p class="section-sub">Complete this on Day 30. Pour something you love, sit somewhere comfortable, and be honest with yourself.</p>`;

      for (let i = 0; i < 3; i++) {
        const r = (mr.goals && mr.goals[i]) || {target:'',accomplished:'',hit:'',win:''};
        const gLabel = state.goals[i].sentence || state.goals[i].text || `Goal ${i+1}`;
        html += `<div class="review-block">
          <div class="review-block-title">Goal ${i+1}: ${esc(gLabel.substring(0,50))}</div>
          <label for="mrgt${i}">My 30-day target was</label>
          <input type="text" id="mrgt${i}" value="${esc(r.target)}" oninput="saveMonthlyGoal(${i},'target',this.value)" placeholder="What I set out to achieve this month...">
          <label for="mrga${i}">What I actually accomplished</label>
          <textarea id="mrga${i}" rows="2" oninput="saveMonthlyGoal(${i},'accomplished',this.value)" placeholder="Be specific and honest...">${esc(r.accomplished)}</textarea>
          <label>Did I hit my target?</label>
          <div class="hit-options" role="group">
            <button class="hit-opt ${r.hit==='yes'?'sel-yes':''}" onclick="saveMonthlyGoal(${i},'hit','yes')" aria-pressed="${r.hit==='yes'}">Yes</button>
            <button class="hit-opt ${r.hit==='progress'?'sel-prog':''}" onclick="saveMonthlyGoal(${i},'hit','progress')" aria-pressed="${r.hit==='progress'}">Progress</button>
            <button class="hit-opt ${r.hit==='no'?'sel-no':''}" onclick="saveMonthlyGoal(${i},'hit','no')" aria-pressed="${r.hit==='no'}">No</button>
          </div>
          <label for="mrgw${i}" style="margin-top:12px">My biggest win</label>
