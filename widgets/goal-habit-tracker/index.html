          <input type="text" id="mrgw${i}" value="${esc(r.win)}" oninput="saveMonthlyGoal(${i},'win',this.value)" placeholder="The thing I'm most proud of for this goal...">
        </div>`;
      }

      for (let i = 0; i < 3; i++) {
        const r = (mr.habits && mr.habits[i]) || {days:0,consistent:'',helped:'',hard:''};
        const hLabel = state.habits[i].text || `Habit ${i+1}`;
        html += `<div class="review-block">
          <div class="review-block-title">Habit ${i+1}: ${esc(hLabel.substring(0,50))}</div>
          <div class="days-badge">${getActualHabitDays(i)} / 30 days</div>
          <label>Was I consistent?</label>
          <div class="hit-options" role="group" aria-label="${esc(hLabel)} consistency">
            <button class="hit-opt ${r.consistent==='yes'?'sel-yes':''}" onclick="saveMonthlyHabit(${i},'consistent','yes')" aria-pressed="${r.consistent==='yes'}">Yes</button>
            <button class="hit-opt ${r.consistent==='no'?'sel-no':''}" onclick="saveMonthlyHabit(${i},'consistent','no')" aria-pressed="${r.consistent==='no'}">No</button>
          </div>
          <label for="mrwhat${i}" style="margin-top:12px">What helped</label>
          <input type="text" id="mrwhat${i}" value="${esc(r.helped)}" oninput="saveMonthlyHabit(${i},'helped',this.value)" placeholder="What made it easier...">
          <label for="mrhard${i}">What made it hard</label>
          <input type="text" id="mrhard${i}" value="${esc(r.hard)}" oninput="saveMonthlyHabit(${i},'hard',this.value)" placeholder="What got in the way...">
        </div>`;
      }

      html += `<div class="section-title" style="font-size:10pt;margin-top:8px">Big Picture Reflection</div>
        <label for="mrworked">What really worked this month</label>
        <textarea id="mrworked" rows="2" oninput="saveMonthlyField('worked',this.value)" placeholder="The things I'll keep doing...">${esc(mr.worked||'')}</textarea>
        <label for="mrdidnt">What didn't work</label>
        <textarea id="mrdidnt" rows="2" oninput="saveMonthlyField('didnt',this.value)" placeholder="The things I'll change or drop...">${esc(mr.didnt||'')}</textarea>
        <label for="mrlearned">One new thing I learned about myself</label>
        <textarea id="mrlearned" rows="2" oninput="saveMonthlyField('learned',this.value)" placeholder="Something I discovered this month...">${esc(mr.learned||'')}</textarea>
        <label for="mrproud">What I'm most proud of</label>
        <textarea id="mrproud" rows="2" oninput="saveMonthlyField('proud',this.value)" placeholder="Even if it was small — it counts...">${esc(mr.proud||'')}</textarea>
        <label>My top 3 lessons from this month</label>
        <input type="text" value="${esc((mr.lessons||['','',''])[0])}" oninput="saveMonthlyLesson(0,this.value)" placeholder="Lesson 1...">
        <input type="text" value="${esc((mr.lessons||['','',''])[1])}" oninput="saveMonthlyLesson(1,this.value)" placeholder="Lesson 2...">
        <input type="text" value="${esc((mr.lessons||['','',''])[2])}" oninput="saveMonthlyLesson(2,this.value)" placeholder="Lesson 3...">
        <div class="btn-row" style="margin-top:20px">
          ${dayN < 30 ? `<button class="btn-ghost" onclick="resetTracker()">Reset Tracker</button>` : ''}
          <button class="btn-primary" onclick="saveMonthlyNow()">Save Monthly Review</button>
        </div>`;

      panel.innerHTML = html;
      fadeIn(panel);
    }

    function getActualHabitDays(hi) {
      if (!state.startDate) return 0;
      let count = 0;
      const base = new Date(state.startDate + 'T00:00:00');
      for (let d = 0; d < 30; d++) {
        const dd = new Date(base);
        dd.setDate(base.getDate() + d);
        const key = dd.toISOString().split('T')[0];
        const day = state.days[key];
        if (day && day.habits && day.habits[hi]) {
          const s = day.habits[hi].status;
          if (s === 'full' || s === 'minimum') count++;
        }
      }
      return count;
    }

    function saveMonthlyGoal(i, field, val) {
      if (!state.monthlyReview) state.monthlyReview = {};
      if (!state.monthlyReview.goals) state.monthlyReview.goals = [{},{},{}];
      state.monthlyReview.goals[i][field] = val;
      save();
      if (field === 'hit') renderMonthly();
    }

    function saveMonthlyHabit(i, field, val) {
      if (!state.monthlyReview) state.monthlyReview = {};
      if (!state.monthlyReview.habits) state.monthlyReview.habits = [{},{},{}];
      state.monthlyReview.habits[i][field] = val;
      save();
      if (field === 'consistent') renderMonthly();
    }

    function saveMonthlyField(field, val) {
      if (!state.monthlyReview) state.monthlyReview = {};
      state.monthlyReview[field] = val;
      save();
    }

    function saveMonthlyLesson(i, val) {
      if (!state.monthlyReview) state.monthlyReview = {};
      if (!state.monthlyReview.lessons) state.monthlyReview.lessons = ['','',''];
      state.monthlyReview.lessons[i] = val;
      save();
    }

    function saveMonthlyNow() {
      save();
      showToast('Monthly review saved');
    }

    function resetTracker() {
      mncConfirm(
        'Reset Tracker',
        'This will clear all your daily tracking data, weekly reviews, and monthly review. Your setup (goals, habits, values) will be kept. This cannot be undone.',
        () => {
          state.days = {};
          state.weeklyReviews = {};
          state.monthlyReview = null;
          state.startDate = null;
          save();
          showToast('Tracker reset — ready for a new month');
          renderMonthly();
        }
      );
    }

    // ─── INIT ────────────────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
